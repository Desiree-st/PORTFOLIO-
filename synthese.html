<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Synthèse | KAD.sisr</title>
    <style>
        :root {
            --bg-color: #0f172a; 
            --nav-bg: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --excel-color: #107c10; /* Le vert officiel d'Excel */
            --text-main: #ffffff;
            --text-secondary: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* --- NAVIGATION --- */
        nav {
            background-color: var(--nav-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            border-bottom: 1px solid var(--border-color);
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent-color); text-decoration: none; }
        .nav-links { display: flex; list-style: none; gap: 25px; margin: 0; }
        .nav-links a { text-decoration: none; color: var(--text-secondary); font-weight: 500; }
        .nav-links a.active { color: var(--accent-color); }

        /* --- CONTENU --- */
        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }

        .header-section { margin-bottom: 40px; }
        .header-section h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header-section p { color: var(--text-secondary); font-size: 1.1rem; }

        /* --- CARTE DE TÉLÉCHARGEMENT --- */
        .excel-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        .excel-icon {
            width: 80px;
            height: 80px;
            background: var(--excel-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            box-shadow: 0 0 20px rgba(16, 124, 16, 0.3);
        }

        .file-info { margin-bottom: 10px; }
        .file-info h2 { margin: 0; font-size: 1.4rem; }
        .file-info span { color: var(--text-secondary); font-size: 0.9rem; }

        .btn-download {
            background: var(--excel-color);
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-download:hover {
            background: #159d15;
            transform: translateY(-3px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.3);
        }

        /* --- APERÇU IMAGE --- */
        .preview-label {
            margin-top: 50px;
            display: block;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        .preview-img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .preview-img:hover { opacity: 1; }

    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">KAD.sisr</a>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="documentation.html">Documentation</a></li>
            <li><a href="tableau.html" class="active">Tableau de synthèse</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1>Tableau de Synthèse</h1>
            <p>Accédez au récapitulatif complet de mes compétences professionnelles</p>
        </div>

        <div class="excel-card">
            <div class="excel-icon">X</div>
            <div class="file-info">
                <h2>Tableau_Synthese_OULAI.xlsx</h2>
                <span>Format Microsoft Excel • 45 KB</span>
            </div>
            
            <a href="Tableau_Synthese_OULAI.xlsx" class="btn-download" download>
                📥 Télécharger le tableau
            </a>
        </div>

        <span class="preview-label">Aperçu visuel</span>
        <img src="capture-excel.png" alt="Aperçu du tableau" class="preview-img">
    </div>

</body>
</html>
